<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stranger Alps</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');
        body {
            margin: 0;
            padding: 0;
            background-color: #030000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'Share Tech Mono', monospace;
            touch-action: none;
            -webkit-text-size-adjust: 100%;
        }
        canvas {
            background-color: rgb(3, 2, 8);
            box-shadow: 0 0 45px rgba(255, 0, 0, 0.5), inset 0 0 120px rgba(0, 0, 0, 0.9);
            max-width: 100%;
            max-height: 100%;
            box-sizing: border-box;
            aspect-ratio: 16 / 9;
            transform: translateZ(0);
            -webkit-transform: translateZ(0);
            border: 4px solid #1a0000;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
            -webkit-user-select: none;
        }
    </style>
</head>
<body>

<canvas id="gameCanvas" width="1600" height="900"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");

const FPS = 60;
const GRAVITY = 1.6;
const JUMP_STRENGTH = -39;
const COLORS = {
    SKY: "rgb(5, 5, 20)",
    ALPS_FAR: "rgb(25, 25, 60)",    
    ALPS_NEAR: "rgb(32, 32, 75)",   
    SNOW: "rgb(160, 165, 175)", 
    TEXT: "rgb(242, 17, 17)",
    WHITE: "rgb(255, 255, 255)",
    GLOW_GREY: "rgb(210, 200, 202)",
    ASH: "rgba(180, 180, 200, 0.4)", 
    REC_RED: "rgb(255, 0, 0)",
    TRAIL: "rgba(242, 17, 17, 0.15)"
};

let state = 0; 
let level = 1;
let levelStartTicks = 0;
let levelResults = [];
let currentLevelTries = 1;
let rocksSpawned = 0;
const rocksNeeded = { 1: 10, 2: 15, 3: 20 };
let GROUND_Y = 900 - 452;
let dinoX = 100, dinoY = GROUND_Y;
let dinoVelY = 0, isJumping = false, jumpAngle = 0;
let obstacles = [], spawnTimer = 0, finishingLevel = false;
let nextSpawnThreshold = 80;
let clickCooldown = 0;

let shakeTimer = 0;
let shakeIntensity = 0;
let isExportingScreenshot = false;

let dinoTrail = [];

const dinoImgs = {};
const obsImgs = {};

let audioCtx = null;
const rawSfxBuffers = {};
const audioBuffers = {};
const sfx = {
    playlist: ["music1.ogg", "music2.ogg"],
    currentTrack: 0,
    musicElement: null
};

let lastTime = performance.now();
let smoothDt = 1;
let animTicks = 0;

function initAudioContext() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        for (let key in rawSfxBuffers) {
            if (rawSfxBuffers[key] && !audioBuffers[key]) {
                audioCtx.decodeAudioData(rawSfxBuffers[key].slice(0))
                    .then(decodedBuffer => {
                        audioBuffers[key] = decodedBuffer;
                    })
                    .catch(() => {});
            }
        }
    }
    if (audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
    }
}

const unlockAudio = () => {
    initAudioContext();
    if (sfx.musicElement && state !== 0) sfx.musicElement.play().catch(() => {});
    window.removeEventListener('click', unlockAudio);
    window.removeEventListener('touchstart', unlockAudio);
};
window.addEventListener('click', unlockAudio, { passive: true });
window.addEventListener('touchstart', unlockAudio, { passive: true });

function playSFX(name) {
    if (!audioCtx || !audioBuffers[name]) return;
    const source = audioCtx.createBufferSource();
    source.buffer = audioBuffers[name];
    source.connect(audioCtx.destination);
    source.start(0);
}

function initAssets() {
    const assetSources = {
        dino1: "dino1.png", dino2: "dino2.png", dino3: "dino3.png",
        dustin: "dustin.png", ghost: "ghost.png", demogorgon: "demogorgon.png"
    };
    for (let key in assetSources) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = assetSources[key];
        if(key.startsWith("dino")) dinoImgs[key.replace("dino","")] = img;
        else {
            if(key === "dustin") obsImgs[1] = img;
            if(key === "ghost") obsImgs[2] = img;
            if(key === "demogorgon") obsImgs[3] = img;
        }
    }

    const sfxToLoad = { jump: "jump.ogg", hit: "obstaclehit.ogg" };
    for (let key in sfxToLoad) {
        fetch(sfxToLoad[key])
            .then(response => response.arrayBuffer())
            .then(buffer => {
                rawSfxBuffers[key] = buffer;
            })
            .catch(() => {});
    }

    sfx.musicElement = new Audio(sfx.playlist[sfx.currentTrack]);
    sfx.musicElement.addEventListener('ended', playNextTrack);
}

function playNextTrack() {
    if (state !== 0 && sfx.musicElement) {
        sfx.musicElement.pause();
        sfx.currentTrack = (sfx.currentTrack + 1) % sfx.playlist.length;
        sfx.musicElement.src = sfx.playlist[sfx.currentTrack];
        sfx.musicElement.play().catch(() => {});
    }
}

const ashParticles = [];
for (let i = 0; i < 20; i++) {
    ashParticles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: 1.0 + Math.random() * 1.5,
        speed: 0.8 + Math.random() * 2.5,
        opacity: 0.15 + Math.random() * 0.25
    });
}

class MountainLayer {
    constructor(color, minH, maxH, speed, hasSnow = false) {
        this.color = color;
        this.speed = speed;
        this.hasSnow = hasSnow;
        this.mountains = [];
        this.offset = 0;
        
        let currX = 0;
        while (currX < canvas.width * 2) {
            let w = Math.floor(Math.random() * (900 - 500 + 1)) + 500;
            let h = (Math.floor(Math.random() * (maxH - minH + 1)) + minH) * 2;
            let peakX = currX + Math.floor(w / 2);
            
            let poly = [
                {x: currX, y: 900 - 80},
                {x: peakX, y: 900 - 80 - h},
                {x: currX + w, y: 900 - 80}
            ];
            let snow = hasSnow ? [
                {x: peakX - Math.floor(w / 8), y: 900 - 80 - h + h * 0.25},
                {x: peakX, y: 900 - 80 - h},
                {x: peakX + Math.floor(w / 8), y: 900 - 80 - h + h * 0.25}
            ] : null;
            
            this.mountains.push({poly, snow});
            currX += w - 120;
        }
        this.totalWidth = currX;
    }

    update(dt) {
        let totalSpeed = this.speed * (1.2 + level * 0.2) * 2 * dt;
        this.offset -= totalSpeed;
        if (this.offset <= -this.totalWidth) this.offset += this.totalWidth;
    }

    draw() {
        for (let xPos of [this.offset, this.offset + this.totalWidth]) {
            for (let m of this.mountains) {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.moveTo(m.poly[0].x + xPos, m.poly[0].y);
                ctx.lineTo(m.poly[1].x + xPos, m.poly[1].y);
                ctx.lineTo(m.poly[2].x + xPos, m.poly[2].y);
                ctx.closePath();
                ctx.fill();
                if (m.snow) {
                    ctx.fillStyle = COLORS.SNOW;
                    ctx.beginPath();
                    ctx.moveTo(m.snow[0].x + xPos, m.snow[0].y);
                    ctx.lineTo(m.snow[1].x + xPos, m.snow[1].y);
                    ctx.lineTo(m.snow[2].x + xPos, m.snow[2].y);
                    ctx.closePath();
                    ctx.fill();
                }
            }
        }
    }
}

const farLayer = new MountainLayer(COLORS.ALPS_FAR, 60, 120, 0.4);
const nearLayer = new MountainLayer(COLORS.ALPS_NEAR, 100, 200, 1.2, true);

function formatTime(ms) {
    let s = Math.floor(ms / 1000) % 60;
    let m = Math.floor(ms / 60000);
    let msPart = Math.floor((ms % 1000) / 10);
    return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}:${msPart.toString().padStart(2, '0')}`;
}

function drawNeonText(text, fontStr, color, x, y, spacing = 6, center = false) {
    let cleanFontStr = fontStr.replace(/'Benguiat',/g, '');
    ctx.font = cleanFontStr;
    let isStrangerTitle = fontStr.includes("Georgia") || fontStr.includes("serif");
    
    let totalW = 0;
    for(let char of text) {
        totalW += ctx.measureText(char).width + spacing;
    }
    totalW -= spacing;

    let currX = center ? x - (totalW / 2) : x;
    
    ctx.save();
    
    if (state === 1 && !isExportingScreenshot) {
        let baseCurrX = currX;
        for (let char of text) {
            ctx.fillStyle = "rgba(255, 0, 0, 0.8)";
            ctx.fillText(char, baseCurrX + 2, y + 2);
            baseCurrX += ctx.measureText(char).width + spacing;
        }
    } else {
        if (isStrangerTitle) {
            ctx.shadowColor = "rgba(255, 0, 0, 0.9)";
            ctx.shadowBlur = 20;
        } else {
            ctx.shadowColor = "rgba(255, 0, 0, 0.5)";
            ctx.shadowBlur = 8;
        }
    }

    for (let char of text) {
        ctx.fillStyle = color;
        ctx.fillText(char, currX, y);
        
        if (isStrangerTitle) {
            ctx.fillStyle = "rgba(255, 255, 255, 0.15)";
            ctx.fillText(char, currX, y - 2);
        }
        
        currX += ctx.measureText(char).width + spacing;
    }
    ctx.restore();
}

function drawVignette() {
    let vignette = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width/4, canvas.width/2, canvas.height/2, canvas.width * 0.8);
    vignette.addColorStop(0, "rgba(0,0,0,0)");
    vignette.addColorStop(0.6, "rgba(255, 0, 0, 0.04)");
    vignette.addColorStop(1, "rgba(0, 0, 0, 0.85)");
    ctx.fillStyle = vignette;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function resetLevel(fullReset = false) {
    if (fullReset) {
        level = 1;
        levelResults = [];
        currentLevelTries = 1;
    }
    GROUND_Y = level === 1 ? 900 - 452 : (level === 2 ? 900 - 400 : 900 - 350);
    dinoY = GROUND_Y;
    dinoVelY = 0;
    isJumping = false;
    jumpAngle = 0;
    rocksSpawned = 0;
    obstacles = [];
    spawnTimer = 0;
    finishingLevel = false;
    dinoTrail = [];
    
    let minSpawn = level === 1 ? 40 : (level === 2 ? 50 : 42);
    let maxSpawn = level === 1 ? 110 : (level === 2 ? 120 : 100);
    nextSpawnThreshold = Math.floor(Math.random() * (maxSpawn - minSpawn + 1)) + minSpawn;
    
    levelStartTicks = Date.now();
    clickCooldown = 20;
}

function triggerHit() {
    playSFX('hit');
    shakeTimer = 12;
    shakeIntensity = 6;
    state = 3;
    clickCooldown = 25;
}

function downloadScreenshot() {
    try {
        const offCanvas = document.createElement("canvas");
        offCanvas.width = 1600;
        offCanvas.height = 900;
        const offCtx = offCanvas.getContext("2d");
        
        let tempCtx = ctx;
        ctx = offCtx;
        
        isExportingScreenshot = true;
        drawScene(animTicks);
        isExportingScreenshot = false;
        
        ctx.fillStyle = "rgba(1, 0, 0, 0.88)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.font = "125px 'Georgia', serif";
        let wStranger = 0;
        for (let char of "STRANGER") {
            wStranger += ctx.measureText(char).width + 18;
        }
        wStranger -= 18;

        let wAlps = 0;
        for (let char of "ALPS") {
            wAlps += ctx.measureText(char).width + 18;
        }
        wAlps -= 18;

        ctx.fillStyle = "rgb(242, 17, 17)";
        ctx.shadowColor = "rgba(255, 0, 0, 0.9)";
        ctx.shadowBlur = 20;

        ctx.beginPath();
        ctx.roundRect(canvas.width / 2 - wStranger / 2, 95, wStranger, 7, 3);
        ctx.fill();

        let barGap = 25;
        let sideBarW = (wStranger - wAlps) / 2 - barGap;
        if (sideBarW > 0) {
            ctx.beginPath();
            ctx.roundRect(canvas.width / 2 - wStranger / 2, 245, sideBarW, 7, 3);
            ctx.fill();

            ctx.beginPath();
            ctx.roundRect(canvas.width / 2 + wAlps / 2 + barGap, 245, sideBarW, 7, 3);
            ctx.fill();
        }
        ctx.shadowBlur = 0;

        drawNeonText("STRANGER", "125px 'Georgia', serif", COLORS.TEXT, canvas.width / 2, 205, 18, true);
        drawNeonText("ALPS", "125px 'Georgia', serif", COLORS.TEXT, canvas.width / 2, 335, 18, true);
        
        ctx.font = "44px 'Share Tech Mono', monospace";
        let maxW = 0;
        levelResults.forEach(r => {
            let w = 0;
            for(let char of r) { w += ctx.measureText(char).width + 8; }
            if(w > maxW) maxW = w;
        });

        levelResults.forEach((res, i) => {
            drawNeonText(res, "44px 'Share Tech Mono', monospace", "rgb(200, 190, 192)", canvas.width / 2 - maxW / 2, 420 + (i * 50), 8, false);
        });
        
        const positionsX = [220, canvas.width / 2, canvas.width - 220];
        const positionsY = [630, 630, 630];
        [1, 2, 3].forEach((dinoId, idx) => {
            let dImg = dinoImgs[dinoId];
            if (dImg && dImg.complete) {
                ctx.save();
                ctx.shadowColor = "rgba(242, 17, 17, 0.7)";
                ctx.shadowBlur = 25;
                ctx.translate(positionsX[idx], positionsY[idx]);
                let baseSize = 275;
                if (idx === 0) baseSize = 340;
                if (idx === 1) baseSize = 290;
                ctx.drawImage(dImg, -baseSize / 2, -baseSize / 2, baseSize, baseSize);
                ctx.restore();
            }
        });

        ctx = tempCtx;

        offCanvas.toBlob((blob) => {
            if (!blob) return;
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.download = "stranger-alps-results.png";
            link.href = url;
            link.click();
            setTimeout(() => URL.revokeObjectURL(url), 1000);
        }, "image/png");
    } catch (e) {
        console.error(e);
    }
}

function handleAction() {
    if (clickCooldown > 0) return;
    if (state === 3) return;

    if (state === 0) {
        resetLevel(true);
        if (sfx.musicElement) sfx.musicElement.play().catch(() => {});
        state = 1;
    } else if (state === 1) {
        if (!isJumping) {
            isJumping = true;
            dinoVelY = JUMP_STRENGTH;
            playSFX('jump');
        }
    }
}

function handleMenuSelection(clientX, clientY) {
    if (clickCooldown > 0) return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (clientX - rect.left) * scaleX;
    const mouseY = (clientY - rect.top) * scaleY;

    if (state === 3) {
        if (mouseY > 480 && mouseY < 560) {
            currentLevelTries++;
            resetLevel(false);
            state = 1;
        } else if (mouseY > 600 && mouseY < 680) {
            resetLevel(true);
            state = 0;
        }
    } 
    else if (state === 2) {
        if (level === 3) {
            if (mouseY > 660 && mouseY < 740 && mouseX > 400 && mouseX < 1200) {
                downloadScreenshot();
                clickCooldown = 15;
            }
            else if (mouseY > 770 && mouseY < 880 && mouseX > 400 && mouseX < 1200) {
                resetLevel(true);
                state = 0;
            }
        } else {
            if (mouseY > 760 && mouseY < 880) {
                level++;
                currentLevelTries = 1;
                resetLevel(false);
                state = 1;
            }
        }
    }
}

window.addEventListener("keydown", (e) => { 
    if (e.repeat) return;
    if (e.code === "Space") {
        handleAction(); 
    }
});

canvas.addEventListener("mousedown", (e) => {
    if (state === 3 || state === 2) {
        handleMenuSelection(e.clientX, e.clientY);
    } else {
        handleAction();
    }
});

canvas.addEventListener("touchstart", (e) => {
    e.preventDefault();
    const touch = e.touches[0];
    if (state === 3 || state === 2) {
        handleMenuSelection(touch.clientX, touch.clientY);
    } else {
        handleAction();
    }
}, { passive: false });

function drawScene(ticks) {
    ctx.fillStyle = COLORS.SKY;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "rgb(230, 230, 230)";
    ctx.beginPath(); ctx.arc(canvas.width - 200, 220, 70, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = COLORS.SKY;
    ctx.beginPath();
    ctx.arc(canvas.width - 164, 220, 70, 0, Math.PI * 2); ctx.fill();

    farLayer.draw();  
    nearLayer.draw();

    ctx.fillStyle = "rgb(55, 38, 28)";
    ctx.beginPath();
    ctx.moveTo(0, canvas.height);
    for (let x = 0; x <= canvas.width; x += 40) {
        let soilWave = Math.sin(x * 0.005) * 3 + Math.cos(x * 0.01) * 2;
        ctx.lineTo(x, canvas.height - 80 + soilWave);
    }
    ctx.lineTo(canvas.width, canvas.height);
    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle = "rgb(38, 25, 18)";
    ctx.lineWidth = 4;
    ctx.beginPath();
    for (let x = 0; x <= canvas.width; x += 40) {
        let soilWave = Math.sin(x * 0.005) * 3 + Math.cos(x * 0.01) * 2;
        if(x === 0) ctx.moveTo(x, canvas.height - 80 + soilWave);
        else ctx.lineTo(x, canvas.height - 80 + soilWave);
    }
    ctx.stroke();

    for (let p of ashParticles) {
        ctx.fillStyle = `rgba(180, 180, 200, ${p.opacity})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    }

    if (!isExportingScreenshot && state !== 2) {
        let dImg = dinoImgs[level];
        let size = level === 1 ? 390 : (level === 2 ? 340 : 290);

        if (state === 1) {
            for (let i = 0; i < dinoTrail.length; i++) {
                let pt = dinoTrail[i];
                ctx.save();
                ctx.globalAlpha = pt.alpha;
                ctx.translate(pt.x + size / 2, pt.y + size / 2);
                ctx.rotate((pt.angle * Math.PI) / 180);
                if (dImg && dImg.complete) {
                    ctx.drawImage(dImg, -size / 2, -size / 2, size, size);
                }
                ctx.restore();
            }
        }

        if (dImg && dImg.complete) {
            ctx.save();
            ctx.translate(dinoX + size / 2, dinoY + size / 2);
            ctx.rotate(((jumpAngle % 360) * Math.PI) / 180);
            ctx.drawImage(dImg, -size / 2, -size / 2, size, size);
            ctx.restore();
        }

        for (let obs of obstacles) {
            let oImg = obsImgs[obs.type];
            if (oImg && oImg.complete) {
                let yF = obs.type === 2 ? Math.sin(ticks * 0.003) * 12 : 0;
                ctx.drawImage(oImg, obs.x, obs.y + yF, obs.w, obs.h);
            }
        }
    }

    drawVignette();
}

function updateAndRender() {
    let now = performance.now();
    let dt = (now - lastTime) / (1000 / 60);
    lastTime = now;
    
    if (dt > 3) dt = 1;
    smoothDt = smoothDt * 0.85 + dt * 0.15;
    animTicks += smoothDt * 16.666;

    if (clickCooldown > 0) clickCooldown -= smoothDt;
    if (shakeTimer > 0) shakeTimer -= smoothDt;

    for (let p of ashParticles) {
        p.x -= p.speed * smoothDt;
        if (p.x < 0) {
            p.x = canvas.width;
            p.y = Math.random() * canvas.height;
        }
    }

    if (state === 1) {
        farLayer.update(smoothDt);
        nearLayer.update(smoothDt);
        
        dinoTrail.push({x: dinoX, y: dinoY, angle: jumpAngle, alpha: 0.15});
        if (dinoTrail.length > 2) dinoTrail.shift();
        for(let pt of dinoTrail) { pt.alpha -= 0.05 * smoothDt; }

        dinoVelY += GRAVITY * smoothDt;
        dinoY += dinoVelY * smoothDt;
        if (isJumping) jumpAngle -= 5.5 * smoothDt;
        
        if (dinoY >= GROUND_Y) {
            dinoY = GROUND_Y;
            isJumping = false;
            jumpAngle = 0;
        }

        if (!finishingLevel) {
            spawnTimer += smoothDt;
            if (spawnTimer > nextSpawnThreshold) {
                let obsSize = level === 1 ? 280 : (level === 2 ? 350 : 330);
                let obsY = level === 1 ? (900 - 80 - obsSize + 30) : (level === 2 ? (900 - 80 - obsSize + 20) : (900 - 80 - obsSize + 20));
                obstacles.push({
                    x: canvas.width,
                    y: obsY,
                    w: obsSize,
                    h: obsSize,
                    type: level
                });
                spawnTimer = 0;
                rocksSpawned++;
                
                let minSpawn = level === 1 ? 40 : (level === 2 ? 50 : 42);
                let maxSpawn = level === 1 ? 110 : (level === 2 ? 120 : 100);
                nextSpawnThreshold = Math.floor(Math.random() * (maxSpawn - minSpawn + 1)) + minSpawn;
                
                if (rocksSpawned >= rocksNeeded[level]) finishingLevel = true;
            }
        }

        if (finishingLevel && obstacles.length === 0) {
            let word = currentLevelTries === 1 ? "TRY" : "TRIES";
            levelResults.push(`LEVEL ${level}: ${currentLevelTries} ${word} NEEDED`);
            state = 2;
        }

        for (let i = obstacles.length - 1; i >= 0; i--) {
            let obs = obstacles[i];
            let speedMod = level === 1 ? 16.0 : (level === 2 ? 19.5 : 23.0);
            obs.x -= speedMod * smoothDt;
            
            let hitWidth = isJumping ? 65 : 135;
            let hitHeight = isJumping ? 65 : 185;
            let hitOffsetX = isJumping ? 140 : 105;
            let hitOffsetY = isJumping ? 165 : 85;
            let dinoHitbox = { x: dinoX + hitOffsetX, y: dinoY + hitOffsetY, w: hitWidth, h: hitHeight };
            let infY = level === 1 ? -25 : (level === 2 ? -30 : -10);
            
            let hMod = level === 1 ? 0.70 : (level === 2 ? 0.72 : 0.75);
            let obsHitbox = {
                x: obs.x + (obs.w * ((1 - hMod) / 2)), 
                y: obs.y - (infY / 2), 
                w: obs.w * hMod, 
                h: obs.h + infY
            };

            if (dinoHitbox.x < obsHitbox.x + obsHitbox.w &&
                dinoHitbox.x + dinoHitbox.w > obsHitbox.x &&
                dinoHitbox.y < obsHitbox.y + obsHitbox.h &&
                dinoHitbox.y + dinoHitbox.h > obsHitbox.y) {
                triggerHit();
            }

            if (obs.x < -400) obstacles.splice(i, 1);
        }
    }

    ctx.save();
    
    if (shakeTimer > 0) {
        let dx = (Math.random() - 0.5) * shakeIntensity;
        let dy = (Math.random() - 0.5) * shakeIntensity;
        ctx.translate(dx, dy);
    }

    drawScene(animTicks);

    let pulse = (Math.sin(animTicks * 0.005) + 1) / 2;
    let pulseCol = `rgb(${160 + 95 * pulse}, 10, 10)`;
    let uiColor = state === 1 ? COLORS.TEXT : COLORS.GLOW_GREY;
    
    if (state !== 2) {
        if (state === 1 && Math.floor(animTicks / 600) % 2 === 0) {
            ctx.fillStyle = COLORS.REC_RED;
            ctx.beginPath(); ctx.arc(70, 48, 14, 0, Math.PI * 2); ctx.fill();
        }
        
        drawNeonText("REC", "44px 'Share Tech Mono', monospace", uiColor, 110, 65);
        drawNeonText(`LEVEL ${level}`, "44px 'Share Tech Mono', monospace", uiColor, canvas.width / 2, 65, 6, true);
        let timeStr = formatTime(state === 1 ? (Date.now() - levelStartTicks) : 0);
        drawNeonText(timeStr, "44px 'Share Tech Mono', monospace", uiColor, canvas.width - 440, 65);
    }

    if (state === 0) {
        ctx.fillStyle = "rgb(1, 0, 0)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        drawNeonText("Music prod. by erra", "32px 'Share Tech Mono', monospace", "rgb(235, 230, 232)", canvas.width / 2, 60, 4, true);
        
        ctx.font = "125px 'Georgia', serif";
        let wStranger = 0;
        for (let char of "STRANGER") {
            wStranger += ctx.measureText(char).width + 18;
        }
        wStranger -= 18;

        let wAlps = 0;
        for (let char of "ALPS") {
            wAlps += ctx.measureText(char).width + 18;
        }
        wAlps -= 18;

        ctx.fillStyle = "rgb(242, 17, 17)";
        ctx.shadowColor = "rgba(255, 0, 0, 0.9)";
        ctx.shadowBlur = 20;

        ctx.beginPath();
        ctx.roundRect(canvas.width / 2 - wStranger / 2, 95, wStranger, 7, 3);
        ctx.fill();

        let barGap = 25;
        let sideBarW = (wStranger - wAlps) / 2 - barGap;
        if (sideBarW > 0) {
            ctx.beginPath();
            ctx.roundRect(canvas.width / 2 - wStranger / 2, 245, sideBarW, 7, 3);
            ctx.fill();

            ctx.beginPath();
            ctx.roundRect(canvas.width / 2 + wAlps / 2 + barGap, 245, sideBarW, 7, 3);
            ctx.fill();
        }
        ctx.shadowBlur = 0;

        drawNeonText("STRANGER", "125px 'Georgia', serif", COLORS.TEXT, canvas.width / 2, 205, 18, true);
        drawNeonText("ALPS", "125px 'Georgia', serif", COLORS.TEXT, canvas.width / 2, 335, 18, true);
        
        drawNeonText("You're a dinosaur stuck in the Upside Down!", "42px 'Share Tech Mono', monospace", "rgb(235, 230, 232)", canvas.width / 2, 430, 4, true);
        drawNeonText("Complete 3 challenges to find your way home!", "42px 'Share Tech Mono', monospace", "rgb(235, 230, 232)", canvas.width / 2, 500, 4, true);
        drawNeonText("FIRST MISSION: Jump over Dustin", "44px 'Share Tech Mono', monospace", COLORS.WHITE, canvas.width / 2, 590, 4, true);
        drawNeonText("CLICK/TAP the screen or press the SPACE bar", "42px 'Share Tech Mono', monospace", COLORS.TEXT, canvas.width / 2, 660, 4, true);
        drawNeonText("to jump", "42px 'Share Tech Mono', monospace", COLORS.TEXT, canvas.width / 2, 710, 4, true);
        drawNeonText("CONTINUE", "96px 'Georgia', serif", pulseCol, canvas.width / 2, 830, 10, true);
    } 
    else if (state === 2) {
        ctx.fillStyle = "rgba(1, 0, 0, 0.88)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        let title = level === 3 ? "GATE CLOSED" : "MISSION SUCCESS";
        let instr = level === 3 ? ["", "You've successfully escaped", "the Upside Down!"] :
                    (level === 1 ? ["Next: Leap over the Phoebe Bridgers ghost...", "or is it Eleven wearing a Halloween costume?", "Either way, jump!"] :
                                   ["You're almost at the finish line!", "Jump over the Demogorgons to close the gate!", ""]);
        
        drawNeonText(title, "112px 'Georgia', serif", COLORS.TEXT, canvas.width / 2, 120, 20, true);
        
        ctx.font = "44px 'Share Tech Mono', monospace";
        let maxW = 0;
        levelResults.forEach(r => {
            let w = 0;
            for(let char of r) { w += ctx.measureText(char).width + 8; }
            if(w > maxW) maxW = w;
        });

        levelResults.forEach((res, i) => {
            drawNeonText(res, "44px 'Share Tech Mono', monospace", "rgb(200, 190, 192)", canvas.width / 2 - maxW / 2, 200 + (i * 50), 8, false);
        });
        
        instr.forEach((line, i) => {
            let baseInstrY = level === 3 ? 340 : 390;
            drawNeonText(line, "44px 'Share Tech Mono', monospace", "rgb(245, 242, 243)", canvas.width / 2, baseInstrY + (i * 45), 4, true);
        });

        if (level === 3) {
            const positionsX = [220, canvas.width / 2, canvas.width - 220];
            const positionsY = [505, 505, 505];
            [1, 2, 3].forEach((dinoId, idx) => {
                let dImg = dinoImgs[dinoId];
                if (dImg && dImg.complete) {
                    ctx.save();
                    ctx.shadowColor = "rgba(242, 17, 17, 0.7)";
                    ctx.shadowBlur = 25;
                    ctx.translate(positionsX[idx], positionsY[idx]);
                    
                    ctx.translate(0, Math.sin(animTicks * 0.007) * 20);
                    let sfX = 1 + Math.sin(animTicks * 0.007) * 0.06;
                    let sfY = 1 - Math.sin(animTicks * 0.007) * 0.06;
                    ctx.scale(sfX, sfY);
                    
                    ctx.rotate(Math.sin(animTicks * 0.007) * 0.08);
                    
                    let baseSize = 275;
                    if (idx === 0) baseSize = 340;
                    if (idx === 1) baseSize = 290;
                    ctx.drawImage(dImg, -baseSize / 2, -baseSize / 2, baseSize, baseSize);
                    ctx.restore();
                }
            });

            drawNeonText("SHARE RESULTS", "54px 'Share Tech Mono', monospace", "rgb(255, 255, 255)", canvas.width / 2, 720, 6, true);
            drawNeonText("RESTART GAME", "96px 'Georgia', serif", pulseCol, canvas.width / 2, 840, 10, true);
        } else {
            let btnText = "CONTINUE";
            drawNeonText(btnText, "96px 'Georgia', serif", pulseCol, canvas.width / 2, 840, 10, true);
        }
    } 
    else if (state === 3) {
        ctx.fillStyle = "rgba(4, 0, 0, 0.88)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        drawNeonText("MISSION FAILED", "112px 'Georgia', serif", COLORS.TEXT, canvas.width / 2, 250, 12, true);
        drawNeonText("RETRY LEVEL", "46px 'Share Tech Mono', monospace", COLORS.WHITE, canvas.width / 2, 530, 10, true);
        drawNeonText("RESTART GAME", "46px 'Share Tech Mono', monospace", COLORS.WHITE, canvas.width / 2, 650, 10, true);
    }

    ctx.restore();
    requestAnimationFrame(updateAndRender);
}

initAssets();
resetLevel(true);
requestAnimationFrame(updateAndRender);
</script>

</body>
</html>
